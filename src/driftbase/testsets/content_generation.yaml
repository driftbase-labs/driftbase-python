    count: 5
    queries:
      - "content"
      - "I need a complete content strategy including blog posts social media content email campaigns video scripts case studies white papers landing page copy ad copy SEO optimization content calendar influencer outreach messaging and brand guidelines"
      - "Write something that is simultaneously informative entertaining professional casual detailed and concise"
      - "yes that tone no different style yes formal no casual actually somewhere in between"
      - "I need content but I don't know what kind or what it should say"
