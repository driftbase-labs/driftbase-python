# Run tests on push/PR. Publish workflow (publish.yml) runs only on tags.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install -e ".[analyze]"
          python -m pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short
