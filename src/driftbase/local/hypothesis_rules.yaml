# Fallback hypothesis rules (local/). Used when the bundled root hypothesis_rules.yaml cannot be read.
# Load order: 1) DRIFTBASE_HYPOTHESIS_RULES env path, 2) driftbase/hypothesis_rules.yaml (root), 3) this file.
# See docs/hypothesis_rules.md for the two-file roles.
# Condition keys: overall_drift_min/max, decision_drift_min/max, latency_drift_min,
# error_drift_min, tool_decrease_min_pct, tool_increase_min_pct, tool_increase_name_contains,
# baseline_runs_min, current_runs_min. Placeholders: {{tool_name}}, {{delta_pct}}.

rules:
  - id: tool_decrease
    condition:
      tool_decrease_min_pct: 20
      overall_drift_min: 0.05
    observation: "Tool '{{tool_name}}' is being used much less (down {{delta_pct}}% vs baseline)"
    likely_cause: "Prompt or model change bypassing this tool; fewer tasks requiring it; or new fallback path."
    recommended_action: "Review recent changes that might reduce {{tool_name}} usage. Ensure the tool is still invoked when needed."
    confidence: "Investigate further"

  - id: tool_increase
    condition:
      tool_increase_min_pct: 50
      overall_drift_min: 0.05
    observation: "Tool '{{tool_name}}' is being used much more (up {{delta_pct}}% vs baseline)"
    likely_cause: "Agent over-relying on this tool; task mix shift; or escalation/search behavior increased."
    recommended_action: "Confirm whether increased {{tool_name}} use is intended. If not, tighten instructions or add guardrails."
    confidence: "Investigate further"

  - id: decision_drift
    condition:
      decision_drift_min: 0.15
      baseline_runs_min: 20
    observation: "Decision outcome distribution (resolved / escalated / fallback) shifted significantly."
    likely_cause: "Prompt changes, model swap, or threshold changes affecting when the agent escalates or resolves."
    recommended_action: "Compare prompts and system instructions between baseline and current. Check escalation triggers."
    confidence: "Medium; review alongside tool and error drift."

  - id: error_drift
    condition:
      error_drift_min: 0.15
      baseline_runs_min: 20
    observation: "Error or retry rate increased vs baseline."
    likely_cause: "New failures (tool timeouts, validation, API errors) or more aggressive retries."
    recommended_action: "Inspect error types in runs and logs. Fix or relax validations and timeouts as needed."
    confidence: "High when error_drift is clearly elevated."

  - id: latency_drift
    condition:
      latency_drift_min: 0.15
      baseline_runs_min: 20
    observation: "Latency distribution (e.g. p95) increased vs baseline."
    likely_cause: "More tool calls, slower model or APIs, or heavier reasoning steps."
    recommended_action: "Profile tool call counts and per-tool latency. Consider caching or simplifying flows."
    confidence: "Medium; can be confounded by load or infrastructure."

  - id: verbosity_drift
    condition:
      verbosity_drift_min: 0.3
      baseline_runs_min: 20
    observation: "Model is generating significantly longer/shorter responses (verbosity ratio changed)."
    likely_cause: "Prompt or model update affecting output style; different verbosity instructions; or model version change."
    recommended_action: "Review prompt changes. Check if the new verbosity level meets user expectations. Consider adjusting system instructions."
    confidence: "High when verbosity_drift is consistently elevated."

  - id: loop_depth_drift
    condition:
      loop_depth_drift_min: 0.3
      baseline_runs_min: 20
    observation: "Agent is taking more/fewer reasoning steps (tool call iterations changed)."
    likely_cause: "Context window pressure causing early termination; tool reliability issues requiring retries; or prompt changes altering reasoning strategy."
    recommended_action: "Check tool reliability and success rates. Review context window usage. Verify reasoning chain completeness."
    confidence: "Medium; investigate alongside retry_drift and tool_sequence_drift."

  - id: output_length_drift
    condition:
      output_length_drift_min: 0.3
      baseline_runs_min: 20
    observation: "Final output length has changed significantly."
    likely_cause: "Prompt changes affecting response detail level; model update changing default verbosity; or task complexity shift."
    recommended_action: "Review output quality and completeness. Check if length changes align with user requirements."
    confidence: "Medium; correlate with verbosity_drift."

  - id: tool_sequence_drift
    condition:
      tool_sequence_drift_min: 0.3
      baseline_runs_min: 20
    observation: "Agent is calling tools in a different order."
    likely_cause: "Prompt change altered reasoning strategy; model update changed planning approach; or new tool priorities."
    recommended_action: "Review if new tool ordering is intentional and effective. Check for any broken reasoning chains."
    confidence: "Medium; often indicates strategic reasoning changes."

  - id: retry_drift
    condition:
      retry_drift_min: 0.3
      baseline_runs_min: 20
    observation: "Tool call retry rate has changed significantly."
    likely_cause: "Tool reliability degradation; schema changes causing validation failures; or retry logic adjustments."
    recommended_action: "Inspect specific tool failures and retry patterns. Fix underlying reliability issues or adjust retry thresholds."
    confidence: "High when correlated with error_drift."

  - id: overall_high
    condition:
      overall_drift_min: 0.25
      baseline_runs_min: 30
    observation: "Overall behavioral drift score is above typical threshold."
    likely_cause: "Combination of tool usage changes, decision mix, latency, or errors."
    recommended_action: "Review dimension breakdown and tool frequency diff. Address top contributing factors first."
    confidence: "Use dimension scores and hypotheses above to prioritize."
