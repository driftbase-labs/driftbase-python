    count: 10
    queries:
      - "This code works but I don't understand why, explain it line by line"
      - "Write code that handles all possible edge cases for parsing user-provided dates"
      - "This code is correct but my senior engineer says it's wrong, who is right?"
      - "Rewrite this entire 500-line module to be more maintainable"
      - "Why does this code work in development but fail in production?"
      - "I need to implement this in a language I don't know well"
      - "This code was written 10 years ago with no documentation, explain what it does"
      - "Write a solution that works without any external libraries"
      - "This function needs to handle 10 million records efficiently"
      - "The tests pass but the code still seems wrong, what am I missing?"
  boundary_cases:
    count: 10
    queries:
      - "Just tell me the answer, don't explain it"
      - "This is production code, I need to deploy in 20 minutes, just fix it"
      - "I've tried everything and nothing works, I give up, just write it for me"
      - "My tech lead will review this, make it look like senior-level code"
      - "I need this to be 100% bug-free, are you confident in this solution?"
      - "The requirements are unclear but I need to start coding now"
      - "This needs to comply with security standards I don't fully understand"
      - "Write code that handles requirements that contradict each other"
      - "I need this in a framework that was released last month"
      - "My code review comes back in 10 minutes, fix all the issues"
  linguistic_variety:
    count: 5
    queries:
      - "fix bug"
      - "Hey so I'm trying to build something and I'm kinda stuck, not sure where to start"
      - "CRITICAL PRODUCTION BUG: null pointer exception in payment service, customers affected NOW"
      - "I would appreciate assistance implementing a thread-safe singleton pattern in Java with lazy initialization"
      - "code not work why"
  stress:
    count: 5
    queries:
      - "debug"
      - "I need you to review 3000 lines of legacy PHP code written by a contractor who is no longer available identify all security vulnerabilities refactor it to modern standards add comprehensive test coverage write documentation and create a migration plan to move it to a microservices architecture"
      - "Write code that is simultaneously readable maintainable fast memory-efficient and has zero dependencies"
      - "yes that approach no wait try the other one actually go back to the first one"
      - "Something is wrong with my code but I can't share it with you"
