[build-system]
requires = ["setuptools>=61.0", "setuptools_scm[toml]>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "driftbase"
dynamic = ["version"]
description = "Behavioral drift monitoring for AI agents."
readme = "README.md"
requires-python = ">=3.9"
license-files = ["LICENSE"]
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.25.0",
    "PyYAML>=6.0.0",
    "click>=8.0.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
analyze = [
    "numpy>=1.24.0",
    "scipy>=1.10.0",
    "rich>=13.0.0",
]
semantic = [
    "light-embed>=1.0.0",
]

[project.scripts]
driftbase = "driftbase.cli.main:cli"

[tool.setuptools.package-data]
driftbase = ["**/*.yaml", "hypothesis_rules.yaml"]

# This tells setuptools_scm to read the version from Git tags
[tool.setuptools_scm]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
target-version = "py39"
line-length = 88
src = ["src", "tests"]
exclude = [".git", ".venv", "__pycache__", "build", "dist"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line length handled by formatter

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true