      - "Write something compelling about a product that honestly isn't very good"
      - "I need content but I'll know what I want when I see it"
      - "This needs to rank #1 on Google for a highly competitive keyword"
      - "Write content that sells without sounding like it's selling"
      - "I need this to appeal to everyone while offending no one"
      - "The content needs to be completely original but also exactly like our competitor's"
