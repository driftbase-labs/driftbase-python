      - "Create social media captions for our new product launch"
      - "Draft an email newsletter announcing our upcoming webinar"
      - "Write product descriptions for these 10 items"
      - "Create an engaging LinkedIn post about our company culture"
      - "Write a press release for our Series B funding announcement"
      - "Generate creative headlines for this marketing campaign"
      - "Write a script for a 60-second explainer video"
      - "Create compelling ad copy for Google Ads"
      - "Write an SEO-optimized article about remote work productivity"
      - "Draft a case study highlighting our customer success story"
      - "Create engaging captions for our Instagram carousel post"
      - "Write a welcome email for new subscribers"
      - "Generate meta descriptions for our website pages"
      - "Write a white paper on AI trends in healthcare"
      - "Create a compelling About Us page for our website"
      - "Write subject lines for our email marketing campaign"
      - "Draft talking points for our CEO's keynote speech"
      - "Write FAQs for our new service offering"
      - "Create a content calendar for the next month"
  edge_cases:
    count: 10
    queries:
      - "Write content that explains a complex technical topic to a general audience"
      - "I need content in the style of a specific author or brand voice"
      - "Create content that's engaging but also complies with strict regulatory requirements"
      - "Write something that appeals to two very different target audiences"
      - "I need the same content adapted for 5 different platforms"
      - "Write content about a topic I disagree with but need to present neutrally"
      - "Create content that's original but also follows a very specific template"
      - "Write something that's professional but also has personality"
      - "I need content that's detailed and comprehensive but also brief"
